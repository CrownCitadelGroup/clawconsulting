<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Humanity First</title>
    <meta name="description" content="Humanity First" />
    <link rel="icon" href="/humanityfirstlogobadge.png" type="image/png" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
      }

      main {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      img {
        width: min(560px, 88vw);
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <main aria-label="Humanity First logo">
      <img src="/humanityfirstlogo.svg" alt="Humanity First" />
    </main>
  </body>
</html>
